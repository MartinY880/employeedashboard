version: '3.8'

services:
  # ─── PostgreSQL ──────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    networks:
      - proconnect
    environment:
      POSTGRES_USER: proconnect
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: proconnect
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U proconnect"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ─── ProConnect (Next.js Portal) ────────────────────────
  portal:
    image: crystal02202/proconnect:1.2.15
    container_name: proconnect
    restart: unless-stopped
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik
      - traefik.http.routers.proconnect.rule=Host(`proconnect.mtgpros.com`)
      - traefik.http.routers.proconnect.entrypoints=websecure
      - traefik.http.routers.proconnect.tls.certresolver=letsencrypt
      - traefik.http.services.proconnect.loadbalancer.server.port=3000
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads
      - app_data:/app/src/data
    environment:
      DATABASE_URL: postgresql://proconnect:${POSTGRES_PASSWORD:-changeme}@db:5432/proconnect
      LOGTO_ENDPOINT: ${LOGTO_ENDPOINT}
      LOGTO_APP_ID: ${LOGTO_APP_ID}
      LOGTO_APP_SECRET: ${LOGTO_APP_SECRET}
      LOGTO_COOKIE_SECRET: ${LOGTO_COOKIE_SECRET}
      LOGTO_BASE_URL: ${LOGTO_BASE_URL:-http://76.13.111.181:3000}
      AZURE_TENANT_ID: ${AZURE_TENANT_ID}
      AZURE_CLIENT_ID: ${AZURE_CLIENT_ID}
      AZURE_CLIENT_SECRET: ${AZURE_CLIENT_SECRET}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME}
      OPENWEATHER_API_KEY: ${OPENWEATHER_API_KEY}
      OPENWEATHER_CITY: ${OPENWEATHER_CITY}
      SALESFORCE_SECRET: ${SALESFORCE_SECRET}
      SF_CLIENT_ID: ${SF_CLIENT_ID}
      SF_CLIENT_SECRET: ${SF_CLIENT_SECRET}
      SF_LOGIN_URL: ${SF_LOGIN_URL}
    networks:
      - proconnect
      - traefik
networks:
  proconnect:
    driver: bridge
  traefik: 
    external: true 

volumes:
   pg_data:
     driver: local
   uploads_data:
     driver: local
   app_data:
     driver: local